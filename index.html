<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeSite</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- HEADER NEGRO CON DISCO -->
    <header class="site-header">
        <div class="header-content">
            <img src="images/note.png" alt="Disco giratorio" class="disk" id="disk">
        </div>
    </header>

    <!-- CONTENEDOR VACÍO (PARA IR AÑADIENDO COSAS) -->
    <!-- NUEVO: Contenedor para el texto animado -->
    <main class="container">
        <div class="typewriter-container">
            <span class="typewriter-text" id="typewriterText"></span>
            <span class="cursor">|</span>
        </div>
        <div class="coming-soon">
            <p>Enjoy some music while you're at it.</p>
        </div>
        <div class="image-holder">
            <img class="eridu-placeholder" src="images/new-eridu-placeholder.png" alt="new-eridu-placeholder">
        </div>
        
        <!-- Aquí iremos añadiendo contenido -->
    </main>

    <script src="js/javascript.js"></script>
</body>

</html>
